<!DOCTYPE html><html ng-app="debPlayerWeb" ng-csp><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Numia Player Config</title><base href="../"><link href="assets/images/favicon.png" rel="shortcut icon" type="image/png"><link rel="stylesheet" media="screen" href="lib/bootstrap/css/bootstrap.min.css"><link rel="stylesheet" href="stylesheets/debplayerweb.min.css"><script src="lib/jquery/js/jquery.min.js" type="text/javascript"></script><script src="lib/angular/angular.min.js" type="text/javascript"></script><script src="lib/angular/angular-sanitize.min.js" type="text/javascript"></script><script src="lib/angular-dynamic-locale/tmhDynamicLocale.min.js" type="text/javascript"></script><script src="lib/printer/serial.js" type="text/javascript"></script><script src="lib/printer/printer.js" type="text/javascript"></script><script src="lib/printer/usb.js" type="text/javascript"></script><script src="lib/printer/ethernet.js" type="text/javascript"></script><script src="lib/printer/driver.js" type="text/javascript"></script><script src="lib/printer/bluetooth.js" type="text/javascript"></script><script src="lib/printer/android_printerplus.js" type="text/javascript"></script><script src="lib/printer/android_belltech.js" type="text/javascript"></script><script src="lib/printer/android_usb.js" type="text/javascript"></script><script src="lib/printer/web.js" type="text/javascript"></script><script type="text/javascript" src="lib/bootstrap/js/bootstrap.min.js"></script><script src="lib/turnero/patternParser.js" type="text/javascript"></script><script src="javascripts/angular-app.js" type="text/javascript"></script><script src="javascripts/global.min.js" type="text/javascript"></script><script src="javascripts/config.min.js" type="text/javascript"></script><script src="javascripts/player.min.js" type="text/javascript"></script><script src="javascripts/devices.min.js" type="text/javascript"></script><script src="javascripts/sync.min.js" type="text/javascript"></script><script src="javascripts/log.min.js" type="text/javascript"></script><script src="javascripts/widgets0.min.js" type="text/javascript"></script><script src="javascripts/widgets1.min.js" type="text/javascript"></script><script src="javascripts/widgets2.min.js" type="text/javascript"></script><script src="javascripts/widgets3.min.js" type="text/javascript"></script><script src="javascripts/widgets4.min.js" type="text/javascript"></script><script src="javascripts/widgets5.min.js" type="text/javascript"></script><script src="javascripts/widgets6.min.js" type="text/javascript"></script><script src="javascripts/debplayerweb.min.js"></script><script type="text/javascript" src="lib/lg/js/cordova/2.7.0/cordova.webos.js"></script><script type="text/javascript" src="lib/lg/js/scapVersionDecider.js"></script></head><body><div class="config-container" ng-controller="configCtrl"><form id="mainConfigView"><div class="row"><div class="form-group col-xs-10 col-md-10 col-lg-10"><label class="control-label text-center">{{ "CONFIG__SERVER_URL" | translate }}</label><div class="input-group"><input type="text" class="form-control" ng-model="config.serverUrl" value="{{config.serverUrl}}" maxlength="255"> <span class="input-group-addon"><button class="glyphicon glyphicon-info-sign tooltip" aria-hidden="true"><span class="tooltiptext">{{"CONFIG__HINT_URL" | translate}}</span></button></span></div></div><div class="form-group col-xs-2 col-md-2 col-lg-2"><label class="control-label text-center">{{"CONFIG__SCREEN_ID" | translate}}</label><div class="input-group"><input type="number" class="form-control" disabled="disabled" ng-model="config.screenId" value="{{config.screenId}}"> <span class="input-group-addon"><button class="glyphicon glyphicon-info-sign tooltip" aria-hidden="true"><span class="tooltiptext tooltip-small">{{"CONFIG__HINT_ID" | translate}}</span></button></span></div></div><div class="form-group col-xs-6 col-md-6 col-lg-6"><label class="control-label">{{"CONFIG__TOKEN" | translate}}</label><input type="input" class="form-control" ng-model="config.tokentmp" placeholder="{{config.screenId}}-xxxxxx"></div></div><div class="row"><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label><input type="checkbox" ng-model="config.mouse" ng-checked="{{config.mouse}}"> {{"CONFIG__ENABLE_MOUSE" | translate}}</label></div><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label><input type="checkbox" ng-model="config.showPrintingSlide" ng-checked="{{config.showPrintingSlide}}"> {{"CONFIG__PRINTING_SLIDE" | translate}}</label></div><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label><input type="checkbox" ng-model="config.printer.ticketPos" ng-checked="{{config.printer.ticketPos}}"> {{"CONFIG__PRINT_POS_TICKET" | translate}}</label></div><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label><input type="checkbox" ng-model="config.windowModeEnabled"> {{"CONFIG__WINDOW_MODE_ENABLE" | translate}}</label></div><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label><input type="checkbox" ng-model="config.keyPadParsingEnabled"> {{"CONFIG__KEYPAD_PARSING" | translate}}</label></div><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label ng-if='!["3", "5", "6", "8"].includes(config.printer.type)'><input type="checkbox" ng-model="config.printer.fullCut" ng-checked="{{config.printer.fullCut}}"> {{"CONFIG__FULL_CUT" | translate}}</label></div><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label ng-if='!["3", "5", "6", "8"].includes(config.printer.type)'><input type="checkbox" ng-model="config.printer.useDeprecatedCommands" ng-checked="{{config.printer.useDeprecatedCommands}}"> {{"CONFIG__USE_DEPRECATED_COMMANDS" | translate}}</label></div><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label ng-if='!["3", "5", "6", "8"].includes(config.printer.type) && config.printer.presenterTime > 0'><input type="checkbox" ng-model="config.printer.ejectTicket" ng-checked="{{config.printer.ejectTicket}}"> {{"CONFIG__EJECT_TICKET" | translate}}</label></div><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label><input type="checkbox" ng-model="config.debugOnScreen" ng-checked="{{config.debugOnScreen}}"> {{"CONFIG__DEBUG_ON_SCREEN" | translate}}</label></div><div class="checkbox-group checkbox col-xs-6 col-md-4 col-lg-4"><label><input type="checkbox" ng-model="config.maxDebug" ng-checked="{{config.maxDebug}}"> {{"CONFIG__MAX_DEBUG" | translate}}</label></div></div><div class="row"><div class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__PRINTER_TYPE" | translate}}</label><select class="form-control" ng-model="config.printer.type" id="printer-select"><option value="{{PTYPE.Serial}}">Serial</option><option value="{{PTYPE.USB}}">USB</option><option value="{{PTYPE.Ethernet}}">Ethernet</option><option value="{{PTYPE.Driver}}">Driver</option><option value="{{PTYPE.DriverUSB}}">Driver (USB)</option><option value="{{PTYPE.DriverSerial}}">Driver (Serial)</option><option value="{{PTYPE.Bluetooth}}">Bluetooth</option><option value="{{PTYPE.AndroidPrinterPlus}}">Android (Printer+)</option><option value="{{PTYPE.Web}}">Web</option><option value="{{PTYPE.AndroidBelltech}}">Android (Belltech)</option><option value="{{PTYPE.AndroidUSB}}">Android (USB)</option></select></div><div class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__TEST_TICKET" | translate}}</label><button type="submit" class="search-button form-control" ng-click="printTestTicket()">Print</button></div><div class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__TICKET_SCALE" | translate}} [%]</label><input type="number" class="form-control" ng-model="config.printer.ticketScale" value="{{config.printer.ticketScale}}"></div><div ng-if='["3", "5", "6"].includes(config.printer.type)' class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__PRINTER" | translate}}</label><select class="form-control" ng-model="config.printer.printerName"><option ng-repeat="element in availablePrinters" value="{{element}}">{{element}}</option></select></div></div><div ng-switch="config.printer.type"><div class="row"><div ng-if='!["3", "5", "6", "8"].includes(config.printer.type)' class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__PRESENTER_TIME" | translate}}</label><input type="number" class="form-control" ng-model="config.printer.presenterTime" value="{{config.printer.presenterTime}}"></div><div ng-switch-when="0" class="form-group col-xs-5 col-md-5 col-lg-5"><label class="control-label text-center">{{"CONFIG__PRINTER_PORT" | translate}}</label><input type="text" class="form-control" ng-model="config.printer.path" value="{{config.printer.path}}"></div><div ng-switch-when="0" class="form-group col-xs-6 col-md-4 col-lg-4"><label class="control-label text-center">{{"CONFIG__BAUDRATE" | translate}}</label><input type="number" class="form-control" ng-model="config.printer.baudrate" value="{{config.printer.baudrate}}"></div><div ng-switch-when="1" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__DEVICE" | translate}}</label><button type="button" class="search-button form-control" ng-click="printerSelect()">{{"CONFIG__DEVICE_SEARCH" | translate}}</button></div><div ng-if='["1", "10"].includes(config.printer.type)' class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__MANUFACTURER_ID" | translate}}</label><input type="text" class="form-control" ng-model="config.printer.vendorId" value="{{config.printer.vendorId}}"></div><div ng-if='["1", "10"].includes(config.printer.type)' class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__PRINTER_ID" | translate}}</label><input type="text" class="form-control" ng-model="config.printer.productId" value="{{config.printer.productId}}"></div><div ng-switch-when="2" class="form-group col-xs-6 col-md-6 col-lg-6"><label class="control-label text-center">{{"CONFIG__PRINTER_URL" | translate}}</label><input type="text" class="form-control" ng-model="config.printer.ethernetUrl" value="{{config.printer.ethernetUrl}}"></div><div ng-switch-when="2" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__PRINTER_PORT" | translate}}</label><input type="text" class="form-control" ng-model="config.printer.ethernetPort" value="{{config.printer.ethernetPort}}"></div><div ng-switch-when="3" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__DEVICE" | translate}}</label><select class="form-control" ng-model="config.printer.device" id="printer-select"><option ng-repeat="(model, data) in config.supportedPrinters" value="{{model}}">{{model}}</option></select></div><div ng-switch-when="3" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__MANUFACTURER_ID" | translate}}</label><input ng-disabled="config.printer.device !== 'Other'" type="text" class="form-control" ng-model="config.supportedPrinters[config.printer.device].vendorId"></div><div ng-switch-when="3" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__PRINTER_ID" | translate}}</label><input ng-disabled="config.printer.device !== 'Other'" type="text" class="form-control" ng-model="config.supportedPrinters[config.printer.device].productId"></div><div ng-switch-when="3" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__PRINTER_PROTOCOL" | translate}}</label><select ng-disabled="config.printer.device !== 'Other'" class="form-control" ng-model="config.supportedPrinters[config.printer.device].protocol"><option value="POS">POS</option><option value="STAR">STAR</option></select></div><div ng-switch-when="5" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__DEVICE" | translate}}</label><select class="form-control" ng-model="config.printer.device" id="printer-select"><option ng-repeat="(model, data) in config.supportedPrinters" value="{{model}}">{{model}}</option></select></div><div ng-switch-when="5" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__MANUFACTURER_ID" | translate}}</label><input ng-disabled="config.printer.device !== 'Other'" type="text" class="form-control" ng-model="config.supportedPrinters[config.printer.device].vendorId"></div><div ng-switch-when="5" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__PRINTER_ID" | translate}}</label><input ng-disabled="config.printer.device !== 'Other'" type="text" class="form-control" ng-model="config.supportedPrinters[config.printer.device].productId"></div><div ng-switch-when="5" class="form-group col-xs-6 col-md-3 col-lg-3"><label class="control-label text-center">{{"CONFIG__PRINTER_PROTOCOL" | translate}}</label><select ng-disabled="config.printer.device !== 'Other'" class="form-control" ng-model="config.supportedPrinters[config.printer.device].protocol"><option value="POS">POS</option><option value="STAR">STAR</option></select></div><div ng-switch-when="4" class="form-group col-xs-6 col-md-4 col-lg-4"><label class="control-label text-center">{{"CONFIG__DEVICE" | translate}}</label><select class="form-control" ng-model="config.printer.bluetoothDevice" id="printer-select"><option ng-repeat="device in bluetoothDevices" value="{{device}}">{{device}}</option></select></div></div></div><div class="row" ng-if="showUsbSettings"><div class="form-group col-xs-6 col-md-4 col-lg-4"><label class="control-label text-center">{{"CONFIG__BARCODE_ID" | translate}}</label><select class="form-control" ng-model="config.barcodeScanner.device" id="printer-select"><option ng-repeat="device in allUsbDevices" value="{{device.value}}">{{device.label}}</option></select></div></div><div class="row align-items-center"><div class="col col-xs-6 col-md-4 col-lg-4"><p class="version">{{config.version}} <input ng-disabled="!updateAvailable || updating" type="submit" value="{{'CONFIG__UPD_PLAYER' | translate}}" class="save-button color-blue" ng-click="update()"></p><div ng-show="updating">{{"CONFIG__UPDATING" | translate}}</div><p></p></div><div class="col col-xs-8 col-md-8 col-lg-8 text-right"><input ng-disabled="!updateAvailable || updating" ng-disabled="!configLoaded" type="submit" value="{{'CONFIG__TEST_UPDATER' | translate}}" class="save-button color-amber" ng-click="testUpdate()"> <input ng-disabled="!configLoaded" type="submit" value="{{'CONFIG__TEST' | translate}}" class="save-button color-blue" ng-click="test()"> <input ng-disabled="!configLoaded" type="submit" value="{{'CONFIG__SAVE' | translate}}" class="save-button color-green" ng-click="save()"> <input type="submit" value="{{'CONFIG__CANCEL' | translate}}" class="save-button color-red" ng-click="close()"></div><div class="col col-xs-6 col-md-4 col-lg-4" id="testConnectionRes" style="font-weight: bold; transform:translateY(-100px)"><div ng-repeat="testResult in testResults"><a ng-if="testResult.resultok" style="color:#3c763d">{{testResult.message}}</a> <a ng-if="!testResult.resultok" style="color:#c9302c">{{testResult.message}}</a></div></div></div></form></div></body></html>
