<div class="logger-console" ng-if="showConsole()"><div class="console-container"><div ng-repeat="value in logsList track by $index"><p ng-if="value.indexOf('[ERROR]') > 0" class="console-error">{{value}}</p><p ng-if="value.indexOf('[DEBUG]') > 0" class="console-debug">{{value}}</p><p ng-if="value.indexOf('[ERROR]') < 0 && value.indexOf('[DEBUG]') < 0" class="console-log">{{value}}</p></div></div><div class="debuginfo-container"><p ng-repeat="(key, value) in debugInfo track by $index">[{{key}}] {{value}}</p></div></div>
