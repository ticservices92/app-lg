<div class="nativeKeypad"><div class="head"><div class="head-container custom-font result" ng-click="focusInput(); autocomplete()"><div class="inputOverlay" auto-complete auto-complete-list="keyPadValueList" auto-complete-value="keyPadValueObject"></div><label ng-if='keyPadStyle.type === "Numerico"'><input class="input" type="number" ng-model="keyPadValue" ng-change="valueChanged()" ng-keydown="keyDown($event)" autocomplete="off"></label><label ng-if='keyPadStyle.type !== "Numerico"'><input class="input" ng-model="keyPadValue" ng-change="valueChanged()" ng-keydown="keyDown($event)" autocomplete="off"></label></div></div><div class="continue-container"><button class="continue" ng-click="next()">Continuar</button></div></div>
