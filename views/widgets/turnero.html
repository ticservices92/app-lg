<div class="turnero" id="{{turneroId}}"><table class="table"><thead><tr class="tableHeader" ng-style="turneroStyle.tableHeader"><td ng-repeat="header in turneroConfig.headers track by $index" class="tableHead" colspan="{{getColspan('header')}}"></td></tr></thead><tbody><tr ng-repeat="turn in turnsToShow track by $index" class="tableRow"><td ng-repeat="col in turn track by $index" class="tableCell row-{{$parent.$index}} {{nthColClasses($index)}}" colspan="{{getColspan('division', $parent.$index, $index)}}" ng-style="getColStyle($index)"><span class="content">{{col}}</span></td></tr></tbody></table></div>
